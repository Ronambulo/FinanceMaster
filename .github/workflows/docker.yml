name: CI / Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Fast TypeScript check on every PR/push
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  docker:
    needs: frontend-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push if main)
        uses: docker/build-push-action@v6
        with:
          context: .
          # PRs: build for amd64 only (fast validation, no push)
          # main: build for both platforms and push
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ github.event_name != 'pull_request' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: |
            ghcr.io/ronambulo/financemaster:latest
            ghcr.io/ronambulo/financemaster:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/ronambulo/financemaster:buildcache
          cache-to: ${{ github.event_name != 'pull_request' && 'type=registry,ref=ghcr.io/ronambulo/financemaster:buildcache,mode=max' || '' }}
